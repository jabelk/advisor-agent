# Deploy finance-agent to Intel NUC via self-hosted runner
# Triggers on push to main branch

name: Deploy to NUC

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write secrets
        run: |
          mkdir -p secrets
          echo -n "${{ secrets.ALPACA_PAPER_API_KEY }}" > secrets/alpaca_api_key.txt
          echo -n "${{ secrets.ALPACA_PAPER_SECRET_KEY }}" > secrets/alpaca_secret_key.txt
          chmod 600 secrets/*

      - name: Build and deploy
        run: |
          docker compose build
          docker compose up -d

      - name: Verify health
        run: |
          sleep 5
          docker compose exec -T app finance-agent health

      - name: Cleanup secrets
        if: always()
        run: |
          rm -rf secrets/
